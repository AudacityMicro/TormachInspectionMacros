name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate post and macro contracts
        run: python scripts/validate_repository.py

      - name: Check shell syntax
        run: bash -n M199 tests/test_m199.sh

      - name: Test result archiving
        run: bash tests/test_m199.sh
